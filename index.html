<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VK-PHOTO-EDITOR</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <div class="container">
        <h1>ML модель для улучшения изображений</h1>
        <h2>Лысак Владислав Игоревич</h2>
        <h2>Ульяновский Государственный Технический университет УлГТУ</h2>
        
        <div class="upload-section">
            <h3>Загрузи свое изображение</h3>
            <div class="upload-area" id="uploadArea">
                <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
                <p class="upload-text">Перетащи изображение сюда</p>
                <button class="btn-select" id="selectBtn">Выбрать изображение</button>
                <input type="file" id="fileInput" accept="image/*" class="file-input">
            </div>
            
            <div class="preview-section" id="previewSection" style="display: none;">
                <div class="preview-container">
                    <img id="previewImage" class="preview-image" alt="Предпросмотр">
                    <div class="image-info">
                        <p id="fileName"></p>
                        <p id="fileSize"></p>
                    </div>
                </div>
                <button class="btn-clear" id="clearBtn">Очистить</button>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
